services:
  postgres:
    image: postgres:18-alpine
    container_name: easypay-postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - easypay-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easypay-backend
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - easypay-network

volumes:
  postgres_data:

networks:
  easypay-network:
    driver: bridge
